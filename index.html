<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Unit Stroke - RSPAD Gatot Soebroto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
        }
        .bg-rspad { background-color: #800000; }
        
        /* Sidebar Desktop */
        aside { transition: all 0.3s; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .main-container { flex-direction: column !important; }
            aside { 
                width: 100% !important; 
                height: auto !important; 
            }
            nav { 
                display: flex !important; 
                overflow-x: auto; 
                padding: 10px !important;
                gap: 8px;
                white-space: nowrap;
            }
            nav button { 
                flex: 0 0 auto; 
                width: auto !important; 
                padding: 8px 16px !important; 
                font-size: 12px !important;
            }
            .sidebar-active { 
                border-right: none !important; 
                border-bottom: 3px solid #fbbf24; 
                background: rgba(255,255,255,0.1) !important;
            }
            .form-card { padding: 1.5rem !important; }
            .desktop-only { display: none; }
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Prevent zoom on focus in iOS */
        input, select, textarea { font-size: 16px !important; border: 2px solid #e2e8f0 !important; }
        input:focus, select:focus { border-color: #800000 !important; outline: none; }
        .bg-manual { background-color: #fefce8; border: 2px solid #fde047 !important; }
        .form-label-info { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; }

/* Efek Animasi Bernafas */
@keyframes breathe {
    0% { opacity: 0.4; transform: scale(0.98); }
    50% { opacity: 1; transform: scale(1.05); }
    100% { opacity: 0.4; transform: scale(0.98); }
}
.animate-breathe {
    animation: breathe 4s ease-in-out infinite;
}
    </style>
</head>
<body class="text-slate-900 overflow-hidden">

    <div class="flex flex-col md:flex-row h-screen main-container">
        
        <aside class="w-full md:w-72 bg-rspad text-white flex flex-col shadow-2xl z-20">
    <div class="p-4 md:p-6 text-center border-b border-white/10 flex flex-col items-center gap-2">
        <div class="tracking-[0.3em] uppercase italic font-black text-yellow-400 text-[10px] md:text-xs mb-1">
                   </div>
        
        <div class="w-12 h-12 md:w-20 md:h-20 bg-white rounded-2xl flex items-center justify-center p-2 shadow-inner">
            <img src="https://stikesrspadgs.ac.id/v2/wp-content/uploads/2025/11/LOGO-RSPAD-2-874x1024.png" alt="Logo" class="max-h-full object-contain">
        </div>

        <div class="mt-2">
            <h1 class="text-xs md:text-lg font-extrabold tracking-tighter leading-none">UNIT STROKE</h1>
            <p class="text-[8px] md:text-[9px] text-slate-400 uppercase font-bold tracking-widest mt-1">RSPAD Gatot Soebroto</p>
        </div>
    </div>
            
            <nav class="flex-1 px-2 md:px-4 py-2 md:py-8 md:space-y-2">
                <button onclick="switchTab('input')" id="btn-input" class="w-full flex items-center gap-3 p-3 rounded-xl transition sidebar-active">
                    <i class="fas fa-user-plus"></i> <span class="font-bold">INPUT PASIEN</span>
                </button>
                <button onclick="switchTab('monitoring')" id="btn-monitoring" class="w-full flex items-center gap-3 p-3 rounded-xl transition text-slate-300 hover:bg-white/10">
                    <i class="fas fa-bed"></i> <span class="font-bold">PASIEN RAWAT</span>
                </button>
                <button onclick="switchTab('stats')" id="btn-stats" class="w-full flex items-center gap-3 p-3 rounded-xl transition text-slate-300 hover:bg-white/10">
                    <i class="fas fa-chart-line"></i> <span class="font-bold">STATISTIK</span>
                </button>
            </nav>

<div class="p-4 bg-black/20 text-center hidden md:flex flex-col items-center gap-1">
        <div class="animate-breathe">
            <span class="text-[11px] font-black tracking-[0.4em] text-yellow-400 italic uppercase">
                Bersyukur
            </span>
        </div>
        <p id="live-clock" class="text-[10px] font-mono opacity-60 text-slate-300"></p>
    </div>
</aside>
            
            <div class="p-4 bg-black/20 text-center hidden md:block">
                <p id="live-clock" class="text-[10px] font-mono opacity-60"></p>
            </div>

        </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-slate-50">
            <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center border-b z-10">
                <h2 id="current-tab-title" class="text-sm md:text-lg font-black text-slate-800 italic uppercase">Registrasi Pasien Baru</h2>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[9px] font-bold text-slate-400 uppercase hidden md:block">Database Online</span>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-4 md:p-8">
                
                <section id="tab-input" class="tab-content active">
                    <div class="max-w-4xl mx-auto bg-white rounded-2xl md:rounded-3xl shadow-xl border p-6 md:p-10 form-card">
                        <form id="patientForm" class="space-y-6 md:space-y-8">
                            
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div class="md:col-span-1">
                                    <h3 class="text-xs font-black text-red-900 uppercase border-l-4 border-red-800 pl-2">Data Admisi</h3>
                                </div>
                                <div class="md:col-span-2 grid grid-cols-2 gap-4">
                                    <div class="col-span-1">
                                        <label class="form-label-info">No. Rekam Medis</label>
                                        <input type="text" name="norm" placeholder="00-00-00" class="w-full p-3 rounded-xl font-bold bg-slate-50" required>
                                    </div>
                                    <div class="col-span-1">
                                        <label class="form-label-info">No. Bed</label>
                                        <input type="text" name="bed" placeholder="S-01" class="w-full p-3 rounded-xl font-bold bg-slate-50" required>
                                    </div>
                                    <div class="col-span-2">
                                        <label class="form-label-info">Jaminan Kesehatan</label>
                                        <select id="insSelect" name="insurance" onchange="checkManual('ins')" class="w-full p-3 rounded-xl font-bold bg-slate-50">
                                            <option value="BPJS Dinas AD">BPJS Dinas AD</option>
                                            <option value="BPJS Purn AD">BPJS Purn AD</option>
                                            <option value="BPJS Dinas AL">BPJS Dinas AL</option>
                                            <option value="BPJS Purn AL">BPJS Purn AL</option>
                                            <option value="BPJS Dinas AU">BPJS Dinas AU</option>
                                            <option value="BPJS Purn AU">BPJS Purn AU</option>
                                            <option value="BPJS Mandiri">BPJS Mandiri</option>
                                            <option value="BPJS Kementrian">BPJS Kementrian</option>
                                            <option value="BPJS Ketenagakerjaan">BPJS Ketenagakerjaan</option>
                                            <option value="BPJS PBI">BPJS PBI</option>
                                            <option value="BPJS Polri">BPJS Polri</option>
                                            <option value="Tunai/Umum">Tunai/Umum</option>
                                            <option value="Lainnya">Lainnya (Manual)</option>
                                        </select>
                                        <input type="text" id="insManual" placeholder="Sebutkan Jaminan..." class="hidden mt-2 w-full p-3 rounded-xl font-semibold bg-manual">
                                    </div>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-6 border-t border-slate-100">
                                <div class="md:col-span-1">
                                    <h3 class="text-xs font-black text-red-900 uppercase border-l-4 border-red-800 pl-2">Medis & DPJP</h3>
                                </div>
                                <div class="md:col-span-2 space-y-4">
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="form-label-info">Kategori</label>
                                            <select name="specialist" class="w-full p-3 rounded-xl font-bold bg-slate-50 text-blue-700">
                                                <option value="Neurologi">Neurologi</option>
                                                <option value="Bedah Saraf">Bedah Saraf</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label class="form-label-info">Nama DPJP</label>
                                            <input type="text" name="dpjp" placeholder="dr. ..., Sp.N" class="w-full p-3 rounded-xl font-bold bg-slate-50" required>
                                        </div>
                                    </div>
                                    <div>
                                        <label class="form-label-info">Diagnosa Stroke</label>
                                        <select id="diagSelect" name="type" onchange="checkManual('diag')" class="w-full p-3 rounded-xl font-bold bg-slate-50 text-red-800">
                                            <option value="Stroke Iskemik">Stroke Iskemik</option>
                                            <option value="Stroke Hemoragik">Stroke Hemoragik</option>
                                            <option value="Lainnya">Lainnya (Manual)</option>
                                        </select>
                                        <input type="text" id="diagManual" placeholder="Tulis Diagnosa Lengkap..." class="hidden mt-2 w-full p-3 rounded-xl font-semibold bg-manual">
                                    </div>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-6 border-t border-slate-100">
                                <div class="md:col-span-1">
                                    <h3 class="text-xs font-black text-red-900 uppercase border-l-4 border-red-800 pl-2">Identitas</h3>
                                </div>
                                <div class="md:col-span-2 space-y-4">
                                    <input type="text" name="name" placeholder="Nama Lengkap Pasien" class="w-full p-3 rounded-xl font-bold bg-slate-50 uppercase" required>
                                    <div class="grid grid-cols-2 gap-4">
                                        <select id="eduSelect" name="education" onchange="checkManual('edu')" class="w-full p-3 rounded-xl font-bold bg-slate-50">
                                            <option value="SD">SD</option>
                                            <option value="SMP">SMP</option>
                                            <option value="SMA">SMA</option>
                                            <option value="Diploma">Diploma</option>
                                            <option value="Sarjana">Sarjana</option>
                                            <option value="Lainnya">Lainnya (Manual)</option>
                                        </select>
                                        <select name="religion" class="w-full p-3 rounded-xl font-bold bg-slate-50">
                                            <option value="Islam">Islam</option>
                                            <option value="Kristen">Kristen</option>
                                            <option value="Katolik">Katolik</option>
                                            <option value="Hindu">Hindu</option>
                                            <option value="Budha">Budha</option>
                                        </select>
                                    </div>
                                    <input type="text" id="eduManual" placeholder="Tulis Pendidikan..." class="hidden w-full p-3 rounded-xl font-semibold bg-manual">
                                    <input type="text" name="phone" placeholder="No. HP Keluarga" class="w-full p-3 rounded-xl font-bold bg-slate-50">
                                    <textarea name="address" rows="2" placeholder="Alamat Lengkap" class="w-full p-3 rounded-xl font-bold bg-slate-50"></textarea>
                                </div>
                            </div>

                            <button type="submit" id="btnSubmit" class="w-full bg-rspad text-white py-4 rounded-2xl font-black text-lg shadow-lg hover:brightness-110 active:scale-[0.98] transition">
                                <i class="fas fa-save mr-2"></i> SIMPAN DATA
                            </button>
                        </form>
                    </div>
                </section>

                <section id="tab-monitoring" class="tab-content">
                    <div class="bg-white rounded-2xl shadow-xl border overflow-hidden">
                        <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                            <h3 class="font-black text-slate-700 text-xs uppercase tracking-widest italic">Pasien Dirawat</h3>
                            <button onclick="loadDataFromServer()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-black">REFRESH</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left min-w-[600px]">
                                <thead class="bg-white text-slate-400 text-[10px] font-black uppercase border-b">
                                    <tr>
                                        <th class="p-4">Bed</th>
                                        <th class="p-4">Nama / RM</th>
                                        <th class="p-4">Spesialis / DPJP</th>
                                        <th class="p-4">Jaminan</th>
                                        <th class="p-4 text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="patientList" class="divide-y divide-slate-100 text-sm"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <section id="tab-stats" class="tab-content">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div class="bg-white p-6 rounded-2xl shadow-md border text-center">
                            <p class="text-[10px] font-black text-slate-400 uppercase">BOR (19 Bed)</p>
                            <h4 id="bor-percent" class="text-4xl font-black text-red-800">--%</h4>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-xl border">
                        <h3 class="font-black text-slate-800 text-xs uppercase mb-6 italic">Statistik Bulanan: Neurologi vs Bedah Saraf</h3>
                        <div class="h-80 md:h-[450px]"><canvas id="monthlyChart"></canvas></div>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <script>
        // GANTI URL INI DENGAN URL APPS SCRIPT ANDA
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwU9ApKsmwdQNyYmzE-vij3PBurFzBvhpOT7valAKNcFKvgt5UN-3B7KKP94bCEvdU/exec'; 
        let myChart;

        function checkManual(type) {
            if(type === 'ins') {
                const s = document.getElementById('insSelect');
                document.getElementById('insManual').classList.toggle('hidden', s.value !== 'Lainnya');
            } else if(type === 'diag') {
                const s = document.getElementById('diagSelect');
                document.getElementById('diagManual').classList.toggle('hidden', s.value !== 'Lainnya');
            } else if(type === 'edu') {
                const s = document.getElementById('eduSelect');
                document.getElementById('eduManual').classList.toggle('hidden', s.value !== 'Lainnya');
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('sidebar-active', 'text-white');
                b.classList.add('text-slate-300');
            });
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('sidebar-active', 'text-white');
            
            const titles = { 'input': 'Registrasi Pasien Baru', 'monitoring': 'Daftar Pasien Aktif', 'stats': 'Laporan Statistik Unit' };
            document.getElementById('current-tab-title').innerText = titles[tabId];
            loadDataFromServer();
        }

        function loadDataFromServer() {
            const list = document.getElementById('patientList');
            fetch(scriptURL)
            .then(res => res.json())
            .then(response => {
                const aktif = response.allData.filter(r => r[14] === "Masuk");
                document.getElementById('bor-percent').innerText = ((aktif.length / 19) * 100).toFixed(1) + "%";

                if(document.getElementById('tab-stats').classList.contains('active')) {
                    renderMonthlyChart(response.monthlyStats);
                }

                list.innerHTML = '';
                if(aktif.length === 0) {
                    list.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-slate-400 font-bold uppercase">Kamar Kosong</td></tr>';
                }

                aktif.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50";
                    tr.innerHTML = `
                        <td class="p-4 font-black text-red-800 text-lg">${row[3]}</td>
                        <td class="p-4 font-bold text-slate-700 uppercase leading-tight">
                            ${row[1]} <br> <span class="text-[9px] text-slate-400 font-mono italic">RM: ${row[2]}</span>
                        </td>
                        <td class="p-4">
                            <span class="text-[10px] font-black block text-slate-800">${row[5]}</span>
                            <span class="text-[9px] bg-blue-50 text-blue-700 px-2 rounded-full font-bold uppercase italic">${row[6]}</span>
                        </td>
                        <td class="p-4 text-[10px] text-slate-500 font-bold uppercase">${row[8]}</td>
                        <td class="p-4 text-center">
                            <button onclick="confirmCheckout('${row[1]}', '${row[3]}')" class="bg-red-50 text-red-600 w-9 h-9 rounded-xl hover:bg-red-600 hover:text-white transition">
                                <i class="fas fa-door-open"></i>
                            </button>
                        </td>
                    `;
                    list.appendChild(tr);
                });
            });
        }

        const form = document.getElementById('patientForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            
            const insVal = document.getElementById('insSelect').value === 'Lainnya' ? document.getElementById('insManual').value : document.getElementById('insSelect').value;
            const diagVal = document.getElementById('diagSelect').value === 'Lainnya' ? document.getElementById('diagManual').value : document.getElementById('diagSelect').value;
            const eduVal = document.getElementById('eduSelect').value === 'Lainnya' ? document.getElementById('eduManual').value : document.getElementById('eduSelect').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> PROSES...';

            const payload = {
                name: form.name.value, norm: form.norm.value, bed: form.bed.value, type: diagVal,
                dpjp: form.dpjp.value, specialist: form.specialist.value, origin: "Unit Stroke",
                insurance: insVal, religion: form.religion.value, education: eduVal,
                phone: form.phone.value, address: form.address.value, status: "Masuk"
            };

            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
            .then(() => {
                alert("Data Berhasil Disimpan.");
                form.reset();
                document.querySelectorAll('.bg-manual').forEach(el => el.classList.add('hidden'));
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save mr-2"></i> SIMPAN DATA';
                loadDataFromServer();
            });
        });

        function confirmCheckout(name, bed) {
            if(confirm(`Pasien ${name} (Bed ${bed}) Keluar?`)) {
                fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "checkout", name: name, bed: bed }) })
                .then(() => loadDataFromServer());
            }
        }

        function renderMonthlyChart(stats) {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            if (myChart) myChart.destroy();
            const labels = Object.keys(stats);
            const dataNeu = labels.map(m => stats[m].neurologi);
            const dataBS = labels.map(m => stats[m].bedahSaraf);

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Neurologi', data: dataNeu, backgroundColor: '#1e40af', borderRadius: 6 },
                        { label: 'Bedah Saraf', data: dataBS, backgroundColor: '#991b1b', borderRadius: 6 }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleString('id-ID', { dateStyle: 'full', timeStyle: 'short' });
        }, 1000);

        window.onload = loadDataFromServer;
    </script>
</body>
</html>
